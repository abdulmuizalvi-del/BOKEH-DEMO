kind = "web"
previewPath = "/"
title = "BOKEH - AI Photography Platform"
version = "1.0.0"
id = "artifacts/bokeh"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20820

[services.development]
run = "pnpm --filter @workspace/bokeh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bokeh", "run", "build" ]
publicDir = "artifacts/bokeh/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20820"
BASE_PATH = "/"
